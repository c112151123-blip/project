{% extends "base.html" %}

{% block title %}註冊 - 學校失物招領系統{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 2rem auto;">
    <div class="card">
        <div class="card-header">用戶註冊</div>
        
        <form method="POST">
            <div class="form-group">
                <label for="id_number">學號/編號 *</label>
                <input type="text" id="id_number" name="id_number" required autofocus 
                       placeholder="輸入您的學號或教職員編號">
            </div>

            <div class="form-group">
                <label for="email">電郵地址</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="real_name">真實姓名</label>
                <input type="text" id="real_name" name="real_name" required>
            </div>

            <div class="form-group">
                <label for="role">身份 *</label>
                <select id="role" name="role" required>
                    <option value="student">學生</option>
                    <option value="staff">教職員</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-success" style="width: 100%;">立即註冊</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem;">
            <p>已有賬戶？ <a href="{{ url_for('auth.login') }}">點此登入</a></p>
        </div>
    </div>
</div>
{% endblock %}
