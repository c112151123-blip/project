{% extends "base.html" %}

{% block title %}登入 - 學校失物招領系統{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <div class="card">
        <div class="card-header">用戶登入</div>
        
        <form method="POST">
            <div class="form-group">
                <label for="id_number">學號/編號</label>
                <input type="text" id="id_number" name="id_number" required autofocus 
                       placeholder="輸入您的學號或編號">
            </div>

            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">登入</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem;">
            <p>還沒有賬戶？ <a href="{{ url_for('auth.register') }}">立即註冊</a></p>
        </div>
    </div>
</div>
{% endblock %}
