{% extends "base.html" %}

{% block title %}編輯失物信息{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <div class="card">
        <div class="card-header">編輯失物信息</div>
        
        <form method="POST">
            <div class="form-group">
                <label for="title">物品名稱 *</label>
                <input type="text" id="title" name="title" required value="{{ item.title }}">
            </div>

            <div class="form-group">
                <label for="category">物品類別 *</label>
                <select id="category" name="category" required>
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if item.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="location">丟失地點 *</label>
                <input type="text" id="location" name="location" required value="{{ item.location }}">
            </div>

            <div class="form-group">
                <label for="description">詳細描述 *</label>
                <textarea id="description" name="description" required>{{ item.description }}</textarea>
            </div>

            <div class="form-group">
                <label for="contact_phone">聯絡電話</label>
                <input type="tel" id="contact_phone" name="contact_phone" value="{{ item.contact_phone or '' }}">
            </div>

            <div class="form-group">
                <label for="status">狀態</label>
                <select id="status" name="status">
                    <option value="lost" {% if item.status == 'lost' %}selected{% endif %}>未找到</option>
                    <option value="found" {% if item.status == 'found' %}selected{% endif %}>已找到</option>
                    <option value="claimed" {% if item.status == 'claimed' %}selected{% endif %}>已認領</option>
                </select>
            </div>

            <button type="submit" class="btn btn-success" style="width: 100%;">保存更改</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="{{ url_for('lost_items.detail_lost', item_id=item.id) }}">返回詳情</a>
        </div>
    </div>
</div>
{% endblock %}
